<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S3 Cloud Manager | Shailesh</title>
    <style>
        :root {
            --primary: #007bff;
            --danger: #dc3545;
            --success: #28a745;
            --bg: #f4f7f9;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 15px; margin-bottom: 25px; }

        /* Upload Section Styling */
        .upload-section {
            background: #eef2f7;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 2px dashed #007bff;
        }
        .input-group { display: flex; gap: 10px; align-items: center; justify-content: center; }

        input[type="file"] {
            padding: 10px;
            background: white;
            border-radius: 5px;
            border: 1px solid #ccc;
            width: 100%;
        }

        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; min-width: 120px; }
        .btn-upload { background: var(--primary); width: 100%; font-size: 16px; }
        .btn-upload:hover { background: #0056b3; }
        .btn-download { background: var(--success); margin-right: 5px; }
        .btn-delete { background: var(--danger); }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #555; font-weight: 600; }
        tr:hover { background-color: #fcfcfc; }

        .status { margin: 15px 0; text-align: center; font-weight: bold; color: var(--primary); min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>☁️ S3 Cloud Manager</h2>

    <div class="upload-section">
        <label for="fileInput"><strong>Select File from Device:</strong></label>
        <input type="file" id="fileInput">
        <button class="btn-upload" onclick="uploadToS3()">📤 Upload to AWS S3</button>
    </div>

    <div id="statusMsg" class="status"></div>

    <table>
        <thead>
        <tr>
            <th>File Name</th>
            <th style="text-align: right;">Actions</th>
        </tr>
        </thead>
        <tbody id="fileTableBody">
        </tbody>
    </table>
</div>

<script>
    const API_BASE = "/api/files";

    // Page Load झाल्यावर लिस्ट लोड करा
    window.onload = loadFileList;

    // 1. S3 मधील सर्व फाईल्सची यादी मिळवणे
    async function loadFileList() {
        const tableBody = document.getElementById('fileTableBody');
        tableBody.innerHTML = "<tr><td colspan='2' style='text-align:center;'>Fetching files from S3...</td></tr>";

        try {
            const response = await fetch(`${API_BASE}/all`);
            const files = await response.json();
            tableBody.innerHTML = "";

            if (files.length === 0) {
                tableBody.innerHTML = "<tr><td colspan='2' style='text-align:center;'>No files found in your S3 bucket.</td></tr>";
                return;
            }

            files.forEach(fileName => {
                const row = `
                    <tr>
                        <td>${fileName}</td>
                        <td style="text-align: right;">
                            <button class="btn-download" onclick="downloadFromS3('${fileName}')">Download</button>
                            <button class="btn-delete" onclick="deleteFromS3('${fileName}')">Delete</button>
                        </td>
                    </tr>`;
                tableBody.innerHTML += row;
            });
        } catch (err) {
            tableBody.innerHTML = "<tr><td colspan='2' style='text-align:center; color:red;'>Error connecting to Backend!</td></tr>";
            console.error(err);
        }
    }

    // 2. डिव्हाइसमधून फाईल अपलोड करणे (Multipart)
    async function uploadToS3() {
        const fileInput = document.getElementById('fileInput');
        const file = fileInput.files[0];
        const status = document.getElementById('statusMsg');

        if(!file) {
            alert("Please select a file first!");
            return;
        }

        const formData = new FormData();
        formData.append("file", file); // 'file' हे नाव Controller मधील @RequestParam शी जुळले पाहिजे

        status.innerText = "🚀 Uploading to AWS...";

        try {
            const response = await fetch(`${API_BASE}/upload`, {
                method: 'POST',
                body: formData
            });

            if(response.ok) {
                status.innerText = "✅ File Uploaded Successfully!";
                fileInput.value = ""; // Input clear करा
                loadFileList(); // Table रिफ्रेश करा
            } else {
                status.innerText = "❌ Upload Failed!";
            }
        } catch (err) {
            status.innerText = "❌ Error occurred during upload.";
            console.error(err);
        }
    }

    // 3. फाईल डाउनलोड करणे
    function downloadFromS3(name) {
        // थेट डाउनलोड एंडपॉईंटला हिट करा
        window.location.href = `${API_BASE}/download/${name}`;
    }

    // 4. फाईल डिलीट करणे
    async function deleteFromS3(name) {
        if(!confirm(`Are you sure you want to delete '${name}'?`)) return;

        try {
            const response = await fetch(`${API_BASE}/delete/${name}`, { method: 'DELETE' });
            if(response.ok) {
                alert("File Deleted!");
                loadFileList();
            }
        } catch (err) {
            alert("Delete failed!");
        }
    }
</script>

</body>
</html>
