name: Application Deployment Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/shailesh-repo:latest .
          docker push ${{ steps.login-ecr.outputs.registry }}/shailesh-repo:latest

      - name: Deploy to EKS with Helm
        run: |
          aws eks update-kubeconfig --region us-west-1 --name shailesh-s3-cluster
          helm upgrade --install bank-app ./shailesh-deployment-chart \
            --set image.repository=${{ steps.login-ecr.outputs.registry }}/shailesh-repo \
            --set image.tag=latest \
            --set service.type=LoadBalancer \
            --set service.port=8080