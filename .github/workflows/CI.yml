name: Application Deployment Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # ✅ Correct Region

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        run: |
          # नवीन ECR रिपॉझिटरी नाव वापरले आहे
          docker build -t ${{ steps.login-ecr.outputs.registry }}/shailesh-new-ecr:latest .
          docker push ${{ steps.login-ecr.outputs.registry }}/shailesh-new-ecr:latest

      - name: Deploy to EKS with Helm
        run: |
          # १. नवीन क्लस्टर आणि रिजन अपडेट करा
          aws eks update-kubeconfig --region us-east-1 --name shailesh-final-cluster
          
          # २. Helm डिप्लॉयमेंट
          # चार्टचा मार्ग आता ./helm असा आहे आणि अ‍ॅप्लिकेशनचे नाव s3-manager-app ठेवले आहे
          helm upgrade --install s3-manager-app ./helm \
            --set image.repository=${{ steps.login-ecr.outputs.registry }}/shailesh-new-ecr \
            --set image.tag=latest \
            --set service.type=LoadBalancer \
            --wait --timeout 10m