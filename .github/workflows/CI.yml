name: Full Stack DevOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # १. AWS Credentials एकदाच सेट करा
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # २. टेराफॉर्म सेटअप
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      # ३. Terraform Init & Apply (Note: single dash for -auto-approve)
      - name: Terraform Init & Apply
        working-directory: ./terraform
        run: |
          terraform init
          terraform apply -auto-approve -input=false   

      # ४. Docker Image बनवून ECR ला पुश करणे
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: s3-cloud-manager
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # ५. EKS क्लस्टरशी कनेक्ट होणे
      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --region ap-south-1 --name shailesh-terraform-cluster

      # ६. Helm ने ॲप डिप्लॉय करणे
      - name: Deploy with Helm
        run: |
          helm upgrade --install bank-app ./shailesh-bank-chart \
            --set image.repository=${{ steps.login-ecr.outputs.registry }}/s3-cloud-manager \
            --set image.tag=latest