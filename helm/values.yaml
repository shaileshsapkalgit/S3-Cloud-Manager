replicaCount: 1

image:
  repository: 588319086414.dkr.ecr.us-east-1.amazonaws.com/shailesh-new-ecr
  pullPolicy: Always
  tag: "latest"

# ✅ हा ब्लॉक असायलाच हवा, नाहीतर तो वरचा एरर येतो
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080

# ✅ हेल्थ चेकसाठी ८०८० पोर्ट
livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 45
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 45
  periodSeconds: 10

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

# डिफॉल्ट व्हॅल्यूज ज्या टेम्पलेट्सला हव्या असतात
nameOverride: ""
fullnameOverride: ""
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
ingress:
  enabled: false
autoscaling:
  enabled: false
nodeSelector: {}
tolerations: []
affinity: {}